<div class="min-h-screen flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a routerLink="/" class="text-3xl font-extrabold tracking-tight text-blue-600 no-underline">
        SportVenue
      </a>
    </div>

    <!-- Forgot Password Card -->
    <div class="neo-bg neo-shadow rounded-3xl p-8">
      @if (!emailSent()) {
        <div class="text-center mb-8">
          <div class="neo-shadow-inset w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-5">
            <i class="pi pi-key text-3xl text-blue-600"></i>
          </div>
          <h1 class="text-2xl font-extrabold text-slate-800 mb-2">Forgot password?</h1>
          <p class="text-slate-500 text-sm font-medium leading-relaxed">
            No worries! Enter your email address and we'll send you a link to reset your password.
          </p>
        </div>

        <form (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
          <!-- Email -->
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Email Address</label>
            <div class="relative">
              <i class="pi pi-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
              <input
                type="email"
                [(ngModel)]="email"
                name="email"
                placeholder="you@example.com"
                class="neo-input w-full pl-12 pr-4 py-3.5 rounded-xl text-slate-700 font-medium placeholder-slate-400"
              />
            </div>
          </div>

          <!-- Submit -->
          <button
            type="submit"
            class="neo-button bg-blue-600 text-white py-3.5 rounded-xl font-bold text-base hover:bg-blue-700 transition-colors w-full"
          >
            Send Reset Link
          </button>
        </form>
      } @else {
        <!-- Success State -->
        <div class="text-center py-4">
          <div class="neo-shadow-inset w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-5">
            <i class="pi pi-check text-3xl text-green-600"></i>
          </div>
          <h1 class="text-2xl font-extrabold text-slate-800 mb-2">Check your email</h1>
          <p class="text-slate-500 text-sm font-medium leading-relaxed mb-2">
            We've sent a password reset link to
          </p>
          <p class="text-blue-600 font-bold text-sm mb-6">{{ email }}</p>
          <p class="text-slate-400 text-xs font-medium mb-6">
            Didn't receive the email? Check your spam folder or try again.
          </p>
          <button
            (click)="emailSent.set(false)"
            class="neo-button px-6 py-3 rounded-xl font-bold text-sm text-blue-700 hover:text-blue-800 transition-colors w-full"
          >
            Try another email
          </button>
        </div>
      }

      <!-- Back to Login -->
      <div class="text-center mt-6 pt-6 border-t border-slate-200/60">
        <a routerLink="/auth/login" class="text-sm font-semibold text-slate-500 hover:text-blue-600 no-underline transition-colors inline-flex items-center gap-2">
          <i class="pi pi-arrow-left text-xs"></i>
          Back to Sign In
        </a>
      </div>
    </div>
  </div>
</div>
