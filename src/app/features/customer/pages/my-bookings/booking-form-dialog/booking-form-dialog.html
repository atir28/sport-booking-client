<div class="px-2 py-4">
  <h2 class="text-xl font-extrabold text-slate-800 mb-6">
    {{ mode === 'create' ? 'Create Booking' : 'Update Booking' }}
  </h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
    <!-- Venue -->
    <div>
      <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Venue</label>
      <p-select
        formControlName="venue"
        [options]="venueOptions"
        placeholder="Select venue"
        styleClass="w-full"
        [style]="{ width: '100%' }"
      ></p-select>
    </div>

    <!-- Sport -->
    <div>
      <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Sport</label>
      <p-select
        formControlName="sport"
        [options]="sportOptions"
        placeholder="Select sport"
        styleClass="w-full"
        [style]="{ width: '100%' }"
      ></p-select>
    </div>

    <!-- Booking Date -->
    <div>
      <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Booking Date</label>
      <p-datepicker
        formControlName="bookingDate"
        [minDate]="minDate"
        placeholder="Select date"
        styleClass="w-full"
        [inputStyleClass]="'w-full'"
        [style]="{ width: '100%' }"
      ></p-datepicker>
    </div>

    <!-- Start Time / End Time -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Start Time</label>
        <p-select
          formControlName="startTime"
          [options]="timeOptions"
          placeholder="Start"
          styleClass="w-full"
          [style]="{ width: '100%' }"
        ></p-select>
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">End Time</label>
        <p-select
          formControlName="endTime"
          [options]="timeOptions"
          placeholder="End"
          styleClass="w-full"
          [style]="{ width: '100%' }"
        ></p-select>
      </div>
    </div>

    <!-- Court -->
    <div>
      <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Court</label>
      <p-select
        formControlName="court"
        [options]="courtOptions"
        placeholder="Select court"
        styleClass="w-full"
        [style]="{ width: '100%' }"
      ></p-select>
    </div>

    <!-- Remarks -->
    <div>
      <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Remarks</label>
      <textarea
        formControlName="remarks"
        rows="3"
        placeholder="Any special requests..."
        class="neo-input w-full px-4 py-3 rounded-xl text-slate-700 font-medium placeholder-slate-400 resize-none"
      ></textarea>
    </div>

    <!-- Actions -->
    <div class="flex justify-end gap-3 mt-2">
      <button
        type="button"
        pButton
        label="Cancel"
        severity="secondary"
        outlined
        (click)="onCancel()"
      ></button>
      <button
        type="submit"
        pButton
        [label]="mode === 'create' ? 'Create Booking' : 'Update Booking'"
      ></button>
    </div>
  </form>
</div>
