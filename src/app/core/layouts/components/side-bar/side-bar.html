<aside style="height: calc(100vh - 70px); margin-top: 70px;" class="p-4 flex flex-col gap-4">
  <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 px-2">Menu</div>

  @if (isVenueOwner) {
    @for (item of venueOwnerMenu; track item.label) {
      <a [routerLink]="item.route" class="neo-button flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:text-blue-600 no-underline transition-all">
        <i [class]="item.icon"></i>
        <span class="font-medium">{{ item.label }}</span>
      </a>
    }
  }

  @if (isSuperAdmin) {
    @for (item of superAdminMenu; track item.label) {
      <a [routerLink]="item.route" class="neo-button flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:text-blue-600 no-underline transition-all">
        <i [class]="item.icon"></i>
        <span class="font-medium">{{ item.label }}</span>
      </a>
    }
  }

  <div class="mt-auto pt-4 border-t border-slate-300">
    <a (click)="logout()" routerLink="/" class="neo-button flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:text-red-500 no-underline transition-all cursor-pointer">
      <i class="pi pi-sign-out"></i>
      <span class="font-medium">Logout</span>
    </a>
  </div>
</aside>
