<header class="neo-bg text-slate-700 px-3 py-2.5 md:px-8 shadow-sm z-1000 fixed w-full">
  <div class="flex items-center justify-between">
    <!-- Left: Toggle + Logo -->
    <div class="flex items-center gap-3">
      @if (showToggle()) {
        <button class="neo-button p-2.5 rounded-full flex items-center justify-center text-slate-600 hover:text-blue-600 focus:outline-none" (click)="toggleSidebar.emit()">
          <i class="pi pi-bars text-lg"></i>
        </button>
      }

      <a routerLink="/" class="text-xl md:text-2xl font-bold tracking-tight text-blue-600 no-underline">
        SportVenue
      </a>
    </div>

    <!-- Right: Not Logged In -->
    @if (!isLoggedIn) {
      <!-- Desktop -->
      <div class="hidden md:flex items-center gap-3 font-medium">
        <a routerLink="/auth/register" [queryParams]="{ role: 'venue-owner' }" class="neo-button px-4 py-2.5 rounded-full font-semibold no-underline text-blue-600 inline-block whitespace-nowrap">
          <i class="pi pi-plus mr-1 text-xs"></i> Register Venue
        </a>
        <a routerLink="/auth/register" class="neo-button px-5 py-2.5 rounded-full font-semibold no-underline text-slate-700 inline-block">Register</a>
        <a routerLink="/auth/login" class="neo-button px-6 py-2.5 rounded-full font-semibold no-underline text-slate-700 inline-block">Login</a>
      </div>

      <!-- Mobile -->
      <div class="flex md:hidden items-center gap-2 font-medium">
        <a routerLink="/auth/login" class="neo-button px-4 py-2 rounded-full font-semibold no-underline text-slate-700 text-sm">
          Login
        </a>

        <div class="relative">
          <button
            class="neo-button p-2 rounded-full flex items-center justify-center text-slate-600 hover:text-blue-600 cursor-pointer"
            (click)="mobileMenuOpen = !mobileMenuOpen"
          >
            <i class="pi pi-ellipsis-v text-sm"></i>
          </button>

          @if (mobileMenuOpen) {
            <div class="fixed inset-0 z-40" (click)="mobileMenuOpen = false"></div>
            <div class="absolute right-0 top-full mt-2 neo-bg neo-shadow rounded-2xl p-2 z-50 min-w-[180px]">
              <a routerLink="/auth/register" [queryParams]="{ role: 'venue-owner' }"
                class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm font-semibold text-blue-600 hover:bg-blue-50/50 no-underline transition-colors"
                (click)="mobileMenuOpen = false">
                <i class="pi pi-plus text-xs"></i>
                Register Venue
              </a>
              <a routerLink="/auth/register"
                class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm font-semibold text-slate-700 hover:bg-slate-100/50 no-underline transition-colors"
                (click)="mobileMenuOpen = false">
                <i class="pi pi-user text-xs"></i>
                Register
              </a>
            </div>
          }
        </div>
      </div>
    }

    <!-- Right: Logged In — User Chip + Dropdown -->
    @if (isLoggedIn) {
      <div class="relative">
        <!-- User Chip -->
        <button
          class="neo-button flex items-center gap-2 px-3 py-1.5 md:px-4 md:py-2 rounded-full cursor-pointer transition-all duration-200 hover:shadow-md"
          (click)="toggleUserMenu()"
        >
          @if (user?.avatar) {
            <img [src]="user!.avatar" [alt]="user!.name" class="w-7 h-7 md:w-8 md:h-8 rounded-full object-cover ring-2 ring-white/50" />
          } @else {
            <div class="w-7 h-7 md:w-8 md:h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs md:text-sm font-bold shadow-sm">
              {{ userInitial }}
            </div>
          }
          <span class="text-sm font-semibold text-slate-700 hidden sm:inline">{{ user?.name }}</span>
          <i class="pi pi-chevron-down text-[10px] text-slate-400 transition-transform duration-200" [class]="userMenuOpen ? 'rotate-180' : ''"></i>
        </button>

        <!-- Dropdown Menu -->
        @if (userMenuOpen) {
          <div class="fixed inset-0 z-40" (click)="closeUserMenu()"></div>
          <div class="absolute right-0 top-full mt-2 neo-bg neo-shadow rounded-2xl p-2 z-50 min-w-[200px]">
            <!-- User Info Header -->
            <div class="px-3 py-2.5 mb-1 border-b border-slate-200/60">
              <p class="text-sm font-bold text-slate-800">{{ user?.name }}</p>
              <p class="text-[11px] text-slate-400 font-medium">{{ user?.email }}</p>
            </div>

            <!-- Menu Items -->
            <a routerLink="/user/profile"
              class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm font-semibold text-slate-700 hover:bg-blue-50/50 hover:text-blue-600 no-underline transition-colors"
              (click)="closeUserMenu()">
              <i class="pi pi-user text-xs"></i>
              Profile
            </a>
            <a routerLink="/settings"
              class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm font-semibold text-slate-700 hover:bg-blue-50/50 hover:text-blue-600 no-underline transition-colors"
              (click)="closeUserMenu()">
              <i class="pi pi-cog text-xs"></i>
              Settings
            </a>
            <div class="my-1 border-t border-slate-200/60"></div>
            <button
              class="w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm font-semibold text-red-500 hover:bg-red-50/50 hover:text-red-600 transition-colors cursor-pointer"
              (click)="logout()">
              <i class="pi pi-sign-out text-xs"></i>
              Logout
            </button>
          </div>
        }
      </div>
    }
  </div>
</header>
